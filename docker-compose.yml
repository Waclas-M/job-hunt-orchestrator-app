services:
  database:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=TwojeHaslo123!
    ports:
      - "1433:1433"

  backend:
    build: 
      # TUTAJ PODAJESZ ŚCIEŻKĘ DO PROJEKTU (tam gdzie jest Dockerfile i .csproj)
      context: ./backend/JHOP/JHOP  
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DevDb=Server=database;Database=JHOP_Db;User Id=sa;Password=TwojeHaslo123!;TrustServerCertificate=True;Encrypt=False
      - ASPNETCORE_URLS=http://+:80
    ports:
      - "5000:80" # Mapowanie: Twoja przeglądarka/Angular uderza w localhost:5000
    depends_on:
      - database

  worker:
    build: ./worker # Tutaj zakładam, że Dockerfile i main.py są bezpośrednio w folderze worker
    environment:
      - API_URL=http://backend/api  # To zadziała wewnątrz sieci Dockera
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      - backend
      - rabbitmq
      - database
      - llm

  llm:
    provider:
      type: model
      options:
        model: ${LLM_MODEL_NAME:-ai/mistral:latest} # Domyślnie używa modelu mistral, ale można to nadpisać przez zmienną środowiskową

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672" # Panel zarządzania RabbitMQ pod localhost:15672