<div class="container-fluid vh-100 m-0 p-0 ">

  <div class="row mb-4 h-100 g-0">
    <div class="col-12 h-100">

      <div class="card border-0 shadow-sm h-100 overflow-y-auto dashboard-card ">

        <div class="card-body p-4 p-lg-5 dashboard-bg">

          <!-- HEADER -->
          <div class="d-flex flex-column flex-lg-row align-items-lg-center justify-content-between gap-3 mb-4">
            <div class="text-center text-md-start">
              <span class="badge bg-success-subtle text-success border border-success-subtle rounded-pill px-3 py-2 mb-3">
                Panel dokumentów
              </span>
              <h2 class="fw-bold mb-2">Wygenerowane dokumenty</h2>
              <p class="text-muted mb-0">Tutaj są twoje wygenerowane dokumenty.</p>
            </div>

            <div class="text-center text-lg-end">
              <div class="small text-muted">Liczba dokumentów</div>
              <div class="fs-4 fw-bold text-success">{{ offers().length }}</div>
            </div>
          </div>

          <!-- LIST -->
          <div class="row g-4">
            @for (offer of offers(); track offer.id) {
              <div class="col-12 col-md-6 col-xl-4 col-xxl-3">

                <div class="card h-100 border-0 shadow-sm offer-card">
                  <div class="card-body p-4 d-flex flex-column">

                    <div class="d-flex align-items-start justify-content-between gap-3 mb-3">
                      <div>
                        <h5 class="card-title fw-bold mb-1">{{offer.companyName}}</h5>
                        <div class="text-muted small">
                          {{offer.createdAt | date:'dd.MM.yyyy HH:mm'}}
                        </div>
                      </div>

                      <span class="badge text-bg-light border rounded-pill px-3 py-2">
                        CV
                      </span>
                    </div>

                    <div class="mb-4">
                      <div class="small text-muted mb-1">Oferta pracy</div>
                      <p class="card-text mb-0">
                        <a
                          href="{{offer.offerURL}}"
                          target="_blank"
                          class="fw-semibold text-primary text-decoration-none"
                        >
                          Przejdź do oferty →
                        </a>
                      </p>
                    </div>

                    <div class="mt-auto d-flex flex-column flex-sm-row gap-2">
                      <button
                        class="btn btn-success w-100"
                        (click)="downoladCvByID(offer.cvFileId, offer.companyName)">
                        Pobierz CV
                      </button>

                      <button
                        class="btn btn-outline-danger w-100"
                        (click)="deleteOfferRekord(offer.id)">
                        Usuń
                      </button>
                    </div>

                  </div>
                </div>

              </div>
            }
          </div>

        </div>

      </div>

    </div>
  </div>
</div>
